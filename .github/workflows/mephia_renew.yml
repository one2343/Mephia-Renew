name: Mephia 多账号续期
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 */5 * *'

permissions:
  actions: write
  contents: read

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOST_PROXY: ${{ secrets.GOST_PROXY }}
      
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🛡️ 启动 GOST 代理
        if: env.GOST_PROXY != ''
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > /dev/null 2>&1 &
          sleep 3
          echo "✅ 代理已就绪"

      - name: 🔧 执行多账号续期
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          GLOBAL_TG_BOT: ${{ secrets.TG_BOT }}
        run: bash mephia_renew.sh

      - name: 🗑️ 清理旧运行记录 (保留最近3次)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0         # 不限制天数，仅按次数保留
          keep_minimum_runs: 3   # 保留最近的 3 次记录
